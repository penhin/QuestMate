services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: questmate-postgres
    environment:
      POSTGRES_DB: questmate
      POSTGRES_USER: questmate
      POSTGRES_PASSWORD: questmate
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - questmate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questmate -d questmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: questmate-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  questmate-postgres-data:
