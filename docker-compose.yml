services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: questmate-postgres
    environment:
      POSTGRES_DB: questmate
      POSTGRES_USER: questmate
      POSTGRES_PASSWORD: questmate
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - questmate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questmate -d questmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: questmate-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: questmate-searxng
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    ports:
      - "127.0.0.1:${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng:/etc/searxng

volumes:
  questmate-postgres-data:
