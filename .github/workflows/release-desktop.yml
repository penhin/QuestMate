name: Release desktop app

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: overlay/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        working-directory: overlay
        run: npm ci
      - name: Verify tag matches desktop version
        shell: pwsh
        run: |
          $version = (Get-Content overlay/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} must match tauri.conf.json version v$version"
          }
      - name: Build signed installer and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: overlay
          tagName: v__VERSION__
          releaseName: QuestMate Overlay v__VERSION__
          releaseBody: See the release assets for installation and update details.
          releaseDraft: false
          prerelease: false
